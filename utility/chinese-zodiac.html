    <script>
        function calculate() {
            const year = parseInt(document.getElementById('year').value);
            if (!year) { alert('Enter year'); return; }
            const zodiacs = ['Rat', 'Ox', 'Tiger', 'Rabbit', 'Dragon', 'Snake', 'Horse', 'Goat', 'Monkey', 'Rooster', 'Dog', 'Pig'];
            const emojis = ['🐀','🐂','🐅','🐇','🐉','🐍','🐎','🐐','🐒','🐓','🐕','🐖'];
            const index = (year - 1900) % 12;
            document.getElementById('emoji').textContent = emojis[index];
            document.getElementById('animal').textContent = zodiacs[index];
            document.getElementById('result').classList.add('show');
        }
    </script>
