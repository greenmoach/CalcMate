<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="apple-touch-icon" href="../favicon.svg">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#e94560">
    <title>Discount Calculator</title>
    <meta name="description" content="Calculate discount prices instantly and easily. Enter original price and discount percentage to find the sale price and amount saved.">
    <meta name="keywords" content="discount calculator, sale price calculator, discount percentage calculator, price off calculator, markdown calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/utility/discount.html">
    <meta property="og:title" content="Discount Calculator">
    <meta property="og:description" content="Calculate discount prices instantly and easily. Enter original price and discount percentage to find the sale price and amount saved.">
    <meta property="og:url" content="http://calculator.sotshau.fun/utility/discount.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Discount Calculator",
        "description": "Calculate discount prices instantly and easily. Enter original price and discount percentage to find the sale price and amount saved.",
        "url": "http://calculator.sotshau.fun/utility/discount.html",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%); }
        .calculator { background: #fff; border-radius: 20px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h1 { color: #ff5e62; text-align: center; margin-bottom: 25px; font-size: 1.2rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #333; margin-bottom: 6px; font-size: 0.8rem; }
        input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; font-family: sans-serif; }
        input:focus { outline: none; border-color: #ff5e62; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-family: inherit; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 25px; padding: 25px; background: #fff0ed; border-radius: 15px; display: none; }
        .result.show { display: block; }
        .price { font-size: 1.8rem; color: #ff5e62; }
        .saved { color: #27ae60; font-family: sans-serif; font-size: 0.8rem; margin-top: 5px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🏷️ Discount</h1>
        <div class="input-group">
            <label>Original Price ($)</label>
            <input type="number" id="price" placeholder="Original price">
        </div>
        <div class="input-group">
            <label>Discount (%)</label>
            <input type="number" id="discount" placeholder="% off">
        </div>
        <button onclick="calculate()">Calculate</button>
        <div class="result" id="result">
            <div class="price" id="final">$0</div>
            <div class="saved" id="saved">Save $0</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const price = parseFloat(document.getElementById('price').value);
            const discount = parseFloat(document.getElementById('discount').value);
            if (!price || !discount) { alert('Enter values'); return; }
            const saved = price * (discount / 100);
            const final = price - saved;
            document.getElementById('final').textContent = '$' + final.toFixed(2);
            document.getElementById('saved').textContent = 'Save $' + saved.toFixed(2);
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
