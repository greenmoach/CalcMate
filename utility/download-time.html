<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Time Calculator</title>
    <meta name="description" content="Calculate how long a file will take to download based on your internet speed. Enter file size and connection speed to estimate download time.">
    <meta name="keywords" content="download time calculator, download speed calculator, file download time calculator, internet speed calculator, transfer time calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/utility/download-time.html">
    <meta property="og:title" content="Download Time Calculator">
    <meta property="og:description" content="Calculate how long a file will take to download based on your internet speed. Enter file size and connection speed to estimate download time.">
    <meta property="og:url" content="http://calculator.sotshau.fun/utility/download-time.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Download Time Calculator",
        "description": "Calculate how long a file will take to download based on your internet speed. Enter file size and connection speed to estimate download time.",
        "url": "http://calculator.sotshau.fun/utility/download-time.html",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #654ea3 0%, #eaafc8 100%); }
        .calculator { background: #fff; border-radius: 20px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h1 { color: #654ea3; text-align: center; margin-bottom: 25px; font-size: 1.2rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #333; margin-bottom: 6px; font-size: 0.8rem; }
        input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; font-family: sans-serif; }
        input:focus { outline: none; border-color: #654ea3; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #654ea3 0%, #eaafc8 100%); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-family: inherit; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 25px; padding: 25px; background: #f5f5f5; border-radius: 15px; text-align: center; display: none; }
        .result.show { display: block; }
        .time { font-size: 1.5rem; color: #654ea3; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>⬇️ Download Time</h1>
        <div class="input-group">
            <label>File Size (MB)</label>
            <input type="number" id="size" placeholder="MB">
        </div>
        <div class="input-group">
            <label>Speed (Mbps)</label>
            <input type="number" id="speed" value="100" placeholder="Mbps">
        </div>
        <button onclick="calculate()">Calculate</button>
        <div class="result" id="result">
            <div class="time" id="time">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const size = parseFloat(document.getElementById('size').value);
            const speed = parseFloat(document.getElementById('speed').value);
            if (!size || !speed) { alert('Enter values'); return; }
            const seconds = (size * 8) / (speed * 1000);
            let timeStr;
            if (seconds < 60) timeStr = seconds.toFixed(1) + ' seconds';
            else if (seconds < 3600) timeStr = (seconds / 60).toFixed(1) + ' minutes';
            else timeStr = (seconds / 3600).toFixed(2) + ' hours';
            document.getElementById('time').textContent = timeStr;
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
