<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Data Calculator</title>
    <meta name="description" content="Calculate your mobile data usage and costs. Track app usage and estimate monthly data bills with our free phone data calculator.">
    <meta name="keywords" content="phone data calculator, mobile data usage calculator, data plan calculator, internet data calculator, cell phone data calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/utility/phone-data.html">
    <meta property="og:title" content="Phone Data Calculator">
    <meta property="og:description" content="Calculate your mobile data usage and costs. Track app usage and estimate monthly data bills with our free phone data calculator.">
    <meta property="og:url" content="http://calculator.sotshau.fun/utility/phone-data.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Phone Data Calculator",
        "description": "Calculate your mobile data usage and costs. Track app usage and estimate monthly data bills with our free phone data calculator.",
        "url": "http://calculator.sotshau.fun/utility/phone-data.html",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }
        .calculator {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #00d2ff; text-align: center; margin-bottom: 25px; font-size: 1.3rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #a0a0a0; margin-bottom: 6px; font-size: 0.85rem; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1rem;
            font-family: sans-serif;
            background: #16213e;
            color: #fff;
        }
        input:focus, select:focus { outline: none; border-color: #00d2ff; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: #16213e;
            border-radius: 15px;
            display: none;
        }
        .result.show { display: block; }
        .usage { font-size: 1.5rem; color: #00d2ff; }
        .days { color: #a0a0a0; font-family: sans-serif; font-size: 0.8rem; margin-top: 5px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #a0a0a0; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>📱 Phone Data</h1>
        <div class="input-group">
            <label>Data Plan (GB)</label>
            <input type="number" id="plan" placeholder="GB per month">
        </div>
        <div class="input-group">
            <label>Daily Activity</label>
            <select id="activity">
                <option value="light media">Light (social, messaging)</option>
                <option value="medium">Medium (browse, music)</option>
                <option value="heavy">Heavy (video, gaming)</option>
            </select>
        </div>
        <button onclick="calculate()">Check</button>
        <div class="result" id="result">
            <div class="usage" id="usage">-</div>
            <div class="days" id="days">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const plan = parseFloat(document.getElementById('plan').value);
            const activity = document.getElementById('activity').value;
            
            if (!plan) { alert('Enter data plan'); return; }
            
            const daily = { light: 0.5, medium: 1.5, heavy: 4 };
            const needed = daily[activity] * 30;
            const daysLeft = Math.floor(plan / daily[activity]);
            
            const status = plan >= needed ? '✅ Enough' : '⚠️ Not enough';
            document.getElementById('usage').textContent = status;
            document.getElementById('days').textContent = 'Lasts ~' + daysLeft + ' days';
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
