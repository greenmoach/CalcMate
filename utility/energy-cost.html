<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Cost Calculator</title>
    <meta name="description" content="Calculate your electricity and energy costs. Estimate monthly utility bills based on appliance usage with our free energy cost calculator.">
    <meta name="keywords" content="energy cost calculator, electricity cost calculator, utility bill calculator, power cost calculator, kWh cost calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/utility/energy-cost.html">
    <meta property="og:title" content="Energy Cost Calculator">
    <meta property="og:description" content="Calculate your electricity and energy costs. Estimate monthly utility bills based on appliance usage with our free energy cost calculator.">
    <meta property="og:url" content="http://calculator.sotshau.fun/utility/energy-cost.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Energy Cost Calculator",
        "description": "Calculate your electricity and energy costs. Estimate monthly utility bills based on appliance usage with our free energy cost calculator.",
        "url": "http://calculator.sotshau.fun/utility/energy-cost.html",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%);
        }
        .calculator {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #f9d423; text-align: center; margin-bottom: 25px; font-size: 1.4rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #a0a0a0; margin-bottom: 6px; font-size: 0.85rem; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 1rem;
            font-family: sans-serif;
            background: #16213e;
            color: #fff;
        }
        input:focus { outline: none; border-color: #f9d423; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f9d423 0%, #ff4e50 100%);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: #16213e;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .cost { font-size: 2rem; color: #f9d423; }
        .period { color: #a0a0a0; font-family: sans-serif; font-size: 0.8rem; margin-top: 5px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #a0a0a0; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>💡 Energy Cost</h1>
        <div class="input-group">
            <label>Watts</label>
            <input type="number" id="watts" placeholder="Appliance watts">
        </div>
        <div class="input-group">
            <label>Hours per Day</label>
            <input type="number" id="hours" value="1">
        </div>
        <div class="input-group">
            <label>Rate ($/kWh)</label>
            <input type="number" id="rate" value="0.12" step="0.01">
        </div>
        <button onclick="calculate()">Calculate</button>
        <div class="result" id="result">
            <div class="cost" id="cost">$0</div>
            <div class="period">per month</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const watts = parseFloat(document.getElementById('watts').value);
            const hours = parseFloat(document.getElementById('hours').value);
            const rate = parseFloat(document.getElementById('rate').value);
            
            if (!watts || !hours) { alert('Enter values'); return; }
            
            const kwh = (watts * hours * 30) / 1000;
            const cost = kwh * rate;
            document.getElementById('cost').textContent = '$' + cost.toFixed(2);
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
