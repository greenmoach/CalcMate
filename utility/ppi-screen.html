    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Orbitron', sans-serif; background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%); }
        .calculator { background: #fff; border-radius: 20px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); width: 100%; max-width: 400px; }
        h1 { color: #4a00e0; text-align: center; margin-bottom: 25px; font-size: 1.1rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #333; margin-bottom: 6px; font-size: 0.75rem; }
        input { width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; font-family: sans-serif; }
        input:focus { outline: none; border-color: #4a00e0; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-family: inherit; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 25px; padding: 25px; background: #f5f0ff; border-radius: 15px; text-align: center; display: none; }
        .result.show { display: block; }
        .ppi { font-size: 1.8rem; color: #4a00e0; }
        .quality { color: #666; font-family: sans-serif; font-size: 0.75rem; margin-top: 5px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🖥️ Screen PPI</h1>
        <div class="input-group">
            <label>Diagonal Size (inches)</label>
            <input type="number" id="size" placeholder="inches">
        </div>
        <div class="input-group">
            <label>Resolution Width (px)</label>
            <input type="number" id="width" placeholder="horizontal pixels">
        </div>
        <div class="input-group">
            <label>Resolution Height (px)</label>
            <input type="number" id="height" placeholder="vertical pixels">
        </div>
        <button onclick="calculate()">Calculate</button>
        <div class="result" id="result">
            <div class="ppi" id="ppiValue">0</div>
            <div class="quality" id="quality">PPI</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const size = parseFloat(document.getElementById('size').value);
            const width = parseFloat(document.getElementById('width').value);
            const height = parseFloat(document.getElementById('height').value);
            if (!size || !width || !height) { alert('Enter all values'); return; }
            const ppi = Math.sqrt(width*width + height*height) / size;
            let q = ppi < 150 ? 'Low' : ppi < 250 ? 'Good' : ppi < 400 ? 'Great' : 'Retina Quality';
            document.getElementById('ppiValue').textContent = ppi.toFixed(1);
            document.getElementById('quality').textContent = q + ' Quality';
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
