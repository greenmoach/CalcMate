<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon.ico">
    <link rel="icon" type="image/png" href="../favicon-96x96.png" sizes="96x96">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#e94560">
    <title>Gas & Fuel Calculator</title>
    <meta name="description" content="Calculate fuel costs and gas expenses for your trips. Enter distance, fuel efficiency, and gas price to estimate your total fuel costs.">
    <meta name="keywords" content="gas calculator, fuel cost calculator, gas mileage calculator, fuel efficiency calculator, gas trip calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/transportation/gas-fuel.html">
    <meta property="og:title" content="Gas & Fuel Calculator">
    <meta property="og:description" content="Calculate fuel costs and gas expenses for your trips. Enter distance, fuel efficiency, and gas price to estimate your total fuel costs.">
    <meta property="og:url" content="http://calculator.sotshau.fun/transportation/gas-fuel.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Gas & Fuel Calculator",
        "description": "Calculate fuel costs and gas expenses for your trips. Enter distance, fuel efficiency, and gas price to estimate your total fuel costs.",
        "url": "http://calculator.sotshau.fun/transportation/gas-fuel.html",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Russo One', sans-serif; background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); }
        .calculator { background: #1a1a1a; border-radius: 20px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; max-width: 420px; }
        h1 { color: #f5af19; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #888; margin-bottom: 6px; font-family: sans-serif; font-size: 0.85rem; }
        input { width: 100%; padding: 14px; border: 2px solid #333; border-radius: 10px; font-size: 1rem; font-family: sans-serif; background: #2d2d2d; color: #fff; }
        input:focus { outline: none; border-color: #f5af19; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-family: inherit; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 25px; padding: 25px; background: #2d2d2d; border-radius: 15px; display: none; }
        .result.show { display: block; }
        .cost { font-size: 1.8rem; color: #f5af19; }
        .details { color: #888; font-family: sans-serif; font-size: 0.8rem; margin-top: 8px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>⛽ Gas & Fuel</h1>
        <div class="input-group">
            <label>Distance (km)</label>
            <input type="number" id="distance" placeholder="Trip distance">
        </div>
        <div class="input-group">
            <label>Fuel Efficiency (L/100km)</label>
            <input type="number" id="efficiency" value="8">
        </div>
        <div class="input-group">
            <label>Gas Price ($/L)</label>
            <input type="number" id="price" value="1.5" step="0.01">
        </div>
        <button onclick="calculate()">Calculate</button>
        <div class="result" id="result">
            <div class="cost" id="cost">$0</div>
            <div class="details" id="details">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const distance = parseFloat(document.getElementById('distance').value);
            const efficiency = parseFloat(document.getElementById('efficiency').value);
            const price = parseFloat(document.getElementById('price').value);
            if (!distance || !efficiency || !price) { alert('Enter all values'); return; }
            const liters = (distance / 100) * efficiency;
            const cost = liters * price;
            document.getElementById('cost').textContent = '$' + cost.toFixed(2);
            document.getElementById('details').textContent = liters.toFixed(1) + 'L needed';
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
