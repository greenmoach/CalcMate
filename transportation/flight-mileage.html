<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="apple-touch-icon" href="../favicon.svg">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#e94560">
    <title>Flight Mileage Calculator</title>
    <meta name="description" content="Calculate flight distance and mileage between airports. Enter departure and arrival cities to estimate flight distance with our free mileage calculator.">
    <meta name="keywords" content="flight mileage calculator, air distance calculator, flight distance calculator, airport distance calculator, mileage calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/transportation/flight-mileage.html">
    <meta property="og:title" content="Flight Mileage Calculator">
    <meta property="og:description" content="Calculate flight distance and mileage between airports. Enter departure and arrival cities to estimate flight distance with our free mileage calculator.">
    <meta property="og:url" content="http://calculator.sotshau.fun/transportation/flight-mileage.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Flight Mileage Calculator",
        "description": "Calculate flight distance and mileage between airports. Enter departure and arrival cities to estimate flight distance with our free mileage calculator.",
        "url": "http://calculator.sotshau.fun/transportation/flight-mileage.html",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Russo One', sans-serif; background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); }
        .calculator { background: #1a1a1a; border-radius: 20px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h1 { color: #00b4db; text-align: center; margin-bottom: 25px; font-size: 1.3rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #888; margin-bottom: 6px; font-family: sans-serif; font-size: 0.85rem; }
        input { width: 100%; padding: 14px; border: 2px solid #333; border-radius: 10px; font-size: 1rem; font-family: sans-serif; background: #2d2d2d; color: #fff; }
        input:focus { outline: none; border-color: #00b4db; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-family: inherit; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 25px; padding: 25px; background: #2d2d2d; border-radius: 15px; display: none; }
        .result.show { display: block; }
        .miles { font-size: 1.5rem; color: #00b4db; }
        .details { color: #888; font-family: sans-serif; font-size: 0.8rem; margin-top: 8px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🛫 Flight Mileage</h1>
        <div class="input-group">
            <label>Distance (km)</label>
            <input type="number" id="distance" placeholder="Flight distance">
        </div>
        <div class="input-group">
            <label>Airline Miles/Point Value ($)</label>
            <input type="number" id="value" value="0.015" step="0.001">
        </div>
        <button onclick="calculate()">Calculate</button>
        <div class="result" id="result">
            <div class="miles" id="miles">0</div>
            <div class="details" id="valueCalc">miles earned</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const distance = parseFloat(document.getElementById('distance').value);
            const value = parseFloat(document.getElementById('value').value);
            if (!distance) { alert('Enter distance'); return; }
            const miles = Math.round(distance * 0.621371);
            const dollarValue = (miles * value).toFixed(2);
            document.getElementById('miles').textContent = miles;
            document.getElementById('valueCalc').textContent = '~ $' + dollarValue + ' value';
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
