<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commute Cost Calculator</title>
    <meta name="description" content="Calculate your daily and monthly commute costs. Include gas, tolls, parking, and public transit costs with our free commute calculator.">
    <meta name="keywords" content="commute cost calculator, daily commute cost calculator, work commute calculator, transportation cost calculator, commute expense calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/transportation/commute-cost.html">
    <meta property="og:title" content="Commute Cost Calculator">
    <meta property="og:description" content="Calculate your daily and monthly commute costs. Include gas, tolls, parking, and public transit costs with our free commute calculator.">
    <meta property="og:url" content="http://calculator.sotshau.fun/transportation/commute-cost.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Commute Cost Calculator",
        "description": "Calculate your daily and monthly commute costs. Include gas, tolls, parking, and public transit costs with our free commute calculator.",
        "url": "http://calculator.sotshau.fun/transportation/commute-cost.html",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Russo One', sans-serif; background: linear-gradient(135deg, #16a085 0%, #1abc9c 100%); }
        .calculator { background: #1a1a1a; border-radius: 20px; padding: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h1 { color: #1abc9c; text-align: center; margin-bottom: 25px; font-size: 1.2rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #888; margin-bottom: 6px; font-family: sans-serif; font-size: 0.85rem; }
        input, select { width: 100%; padding: 14px; border: 2px solid #333; border-radius: 10px; font-size: 1rem; font-family: sans-serif; background: #2d2d2d; color: #fff; }
        input:focus, select:focus { outline: none; border-color: #1abc9c; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #16a085 0%, #1abc9c 100%); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-family: inherit; cursor: pointer; }
        button:hover { transform: translateY(-2px); }
        .result { margin-top: 25px; padding: 25px; background: #2d2d2d; border-radius: 15px; display: none; }
        .result.show { display: block; }
        .cost { font-size: 1.5rem; color: #1abc9c; }
        .details { color: #888; font-family: sans-serif; font-size: 0.75rem; margin-top: 8px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🚇 Commute Cost</h1>
        <div class="input-group">
            <label>Transport Type</label>
            <select id="type">
                <option value="car">Car</option>
                <option value="transit">Public Transit</option>
                <option value="bike">Bicycle</option>
                <option value="walk">Walking</option>
            </select>
        </div>
        <div class="input-group">
            <label>Distance (km one way)</label>
            <input type="number" id="distance" placeholder="One way">
        </div>
        <div class="input-group">
            <label>Work Days per Month</label>
            <input type="number" id="days" value="20">
        </div>
        <button onclick="calculate()">Calculate</button>
        <div class="result" id="result">
            <div class="cost" id="monthly">$0</div>
            <div class="details" id="yearly">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const type = document.getElementById('type').value;
            const distance = parseFloat(document.getElementById('distance').value) || 0;
            const days = parseInt(document.getElementById('days').value) || 20;
            const costs = { car: 0.5, transit: 3, bike: 0.1, walk: 0 };
            const costPerKm = costs[type];
            const monthly = distance * 2 * days * costPerKm;
            document.getElementById('monthly').textContent = '$' + monthly.toFixed(0) + '/month';
            document.getElementById('yearly').textContent = 'Yearly: $' + (monthly * 12).toFixed(0);
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
