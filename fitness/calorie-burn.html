    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Bebas Neue', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #f5576c; text-align: center; margin-bottom: 25px; letter-spacing: 2px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-family: sans-serif; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 3px solid #fce4ec;
            border-radius: 10px;
            font-size: 1rem;
            font-family: sans-serif;
            background: #fff5f7;
        }
        input:focus, select:focus { outline: none; border-color: #f5576c; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            letter-spacing: 2px;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #ffe2e2 0%, #fad0c4 100%);
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .calories { font-size: 2.5rem; color: #d62929; letter-spacing: 2px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #f5576c; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>⚡ CALORIE BURN</h1>
        <div class="input-group">
            <label>Activity</label>
            <select id="activity">
                <option value="8">Running</option>
                <option value="7">Cycling</option>
                <option value="5.5">Swimming</option>
                <option value="6">Walking</option>
                <option value="8">Jump Rope</option>
                <option value="4">Yoga</option>
                <option value="9">HIIT</option>
                <option value="3">Weight Training</option>
            </select>
        </div>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="Your weight">
        </div>
        <div class="input-group">
            <label>Duration (minutes)</label>
            <input type="number" id="minutes" placeholder="Minutes">
        </div>
        <button onclick="calculateBurn()">CALCULATE</button>
        <div class="result" id="result">
            <div class="calories" id="calories">0</div>
            <div>calories burned</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculateBurn() {
            const met = parseFloat(document.getElementById('activity').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const minutes = parseFloat(document.getElementById('minutes').value);
            
            if (!weight || !minutes) { alert('Enter weight and duration'); return; }
            
            const calories = met * weight * (minutes / 60);
            document.getElementById('calories').textContent = Math.round(calories);
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">

</body>
