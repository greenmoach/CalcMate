<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="apple-touch-icon" href="../favicon.svg">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#e94560">
    <title>Grade Percentage Calculator</title>
    <meta name="description" content="Convert your letter grades to percentages and vice versa. Use our free grade percentage calculator to understand your academic performance.">
    <meta name="keywords" content="grade percentage calculator, letter grade to percentage, grade conversion calculator, percentage grade calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/education/grade-percentage.html">
    <meta property="og:title" content="Grade Percentage Calculator">
    <meta property="og:description" content="Convert your letter grades to percentages and vice versa. Use our free grade percentage calculator to understand your academic performance.">
    <meta property="og:url" content="http://calculator.sotshau.fun/education/grade-percentage.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Grade Percentage Calculator",
        "description": "Convert your letter grades to percentages and vice versa. Use our free grade percentage calculator to understand your academic performance.",
        "url": "http://calculator.sotshau.fun/education/grade-percentage.html",
        "applicationCategory": "EducationApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Righteous', cursive;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #11998e; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-family: sans-serif; }
        input {
            width: 100%;
            padding: 14px;
            border: 3px solid #d1f7c4;
            border-radius: 10px;
            font-size: 1rem;
            font-family: sans-serif;
        }
        input:focus { outline: none; border-color: #11998e; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .percent { font-size: 2.5rem; color: #0c6658; }
        .grade { color: #4a5568; font-family: sans-serif; margin-top: 5px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #11998e; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>📊 Grade Percentage</h1>
        <div class="input-group">
            <label>Points Earned</label>
            <input type="number" id="earned" placeholder="Score">
        </div>
        <div class="input-group">
            <label>Points Possible</label>
            <input type="number" id="possible" placeholder="Total">
        </div>
        <button onclick="calculate()">Convert</button>
        <div class="result" id="result">
            <div class="percent" id="percent">0%</div>
            <div class="grade" id="letter">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const earned = parseFloat(document.getElementById('earned').value);
            const possible = parseFloat(document.getElementById('possible').value);
            
            if (!earned || !possible) { alert('Enter both values'); return; }
            
            const percent = (earned / possible) * 100;
            let letter;
            if (percent >= 90) letter = 'A';
            else if (percent >= 80) letter = 'B';
            else if (percent >= 70) letter = 'C';
            else if (percent >= 60) letter = 'D';
            else letter = 'F';
            
            document.getElementById('percent').textContent = percent.toFixed(1) + '%';
            document.getElementById('letter').textContent = 'Grade: ' + letter;
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
