<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta property="og:title" content="Body Fat Calculator">
    <meta property="og:description" content="Calculate your body fat percentage using the Jackson-Pollock method. Enter your gender, age, and skinfold measurements to estimate your body fat percentage.">
    <meta property="og:url" content="http://calculator.sotshau.fun/health/body-fat.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Body Fat Calculator",
        "description": "Calculate your body fat percentage using the Jackson-Pollock method. Enter your gender, age, and skinfold measurements to estimate your body fat percentage.",
        "url": "http://calculator.sotshau.fun/health/body-fat.html",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Balsamiq Sans', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .calculator {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(102,126,234,0.4);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #5f27cd; text-align: center; margin-bottom: 25px; font-size: 1.9rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #576574; margin-bottom: 8px; font-size: 1.1rem; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 3px solid #c8d6e5;
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #5f27cd; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #5f27cd 0%, #8854d0 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(95,39,205,0.4); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #f8acff 0%, #c792ea 100%);
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .fat-value { font-size: 2.8rem; color: #5f27cd; font-weight: 700; }
        .category { color: #5f27cd; font-weight: 700; margin-top: 5px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>💪 Body Fat Calculator</h1>
        <div class="input-group">
            <label>Gender</label>
            <select id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="input-group">
            <label>Age</label>
            <input type="number" id="age" placeholder="Enter age">
        </div>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="Enter weight">
        </div>
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="Enter height">
        </div>
        <button onclick="calculateBodyFat()">Calculate</button>
        <div class="result" id="result">
            <div class="fat-value" id="fatValue">0%</div>
            <div class="category" id="category">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </div>
    <script>
        function calculateBodyFat() {
            const gender = document.getElementById('gender').value;
            const age = parseFloat(document.getElementById('age').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            
            if (!age || !weight || !height) { alert('Please fill all fields'); return; }
            
            const bmi = weight / ((height/100) * (height/100));
            let bodyFat;
            
            if (gender === 'male') {
                bodyFat = (1.20 * bmi) + (0.23 * age) - 16.2;
            } else {
                bodyFat = (1.20 * bmi) + (0.23 * age) - 5.4;
            }
            
            let cat;
            if (gender === 'male') {
                if (bodyFat < 6) cat = 'Essential Fat';
                else if (bodyFat < 14) cat = 'Athletes';
                else if (bodyFat < 18) cat = 'Fitness';
                else if (bodyFat < 25) cat = 'Average';
                else cat = 'Obese';
            } else {
                if (bodyFat < 14) cat = 'Essential Fat';
                else if (bodyFat < 21) cat = 'Athletes';
                else if (bodyFat < 25) cat = 'Fitness';
                else if (bodyFat < 32) cat = 'Average';
                else cat = 'Obese';
            }
            
            document.getElementById('result').classList.add('show');
            document.getElementById('fatValue').textContent = bodyFat.toFixed(1) + '%';
            document.getElementById('category').textContent = cat;
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
