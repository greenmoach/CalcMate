<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Calculate your baby's age in weeks, months, and years. Track your baby's development milestones with our free baby age calculator.">
    <meta name="keywords" content="baby age calculator, baby milestones calculator, infant age calculator, baby development calculator, how old is my baby calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/health/baby-age.html">
    <meta property="og:title" content="Baby Age Calculator">
    <meta property="og:description" content="Calculate your baby's age in weeks, months, and years. Track your baby's development milestones with our free baby age calculator.">
    <meta property="og:url" content="http://calculator.sotshau.fun/health/baby-age.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Baby Age Calculator",
        "description": "Calculate your baby's age in weeks, months, and years. Track your baby's development milestones with our free baby age calculator.",
        "url": "http://calculator.sotshau.fun/health/baby-age.html",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
        }
        .calculator {
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(168,230,207,0.4);
            width: 100%;
            max-width: 400px;
        }
        h1 { color: #1abc9c; text-align: center; margin-bottom: 25px; font-size: 1.8rem; }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #16a085; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 15px;
            border: 3px solid #a3e4d7;
            border-radius: 15px;
            font-size: 1.1rem;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #1abc9c; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1abc9c 0%, #48c9b0 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #d5f5e3 0%, #abebc6 100%);
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .age { font-size: 2rem; color: #1abc9c; }
        .age-detail { color: #16a085; margin-top: 8px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #1abc9c; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧒 Baby Age Calculator</h1>
        <div class="input-group">
            <label>Baby's Birth Date</label>
            <input type="date" id="birthDate">
        </div>
        <button onclick="calculateBabyAge()">Calculate Age</button>
        <div class="result" id="result">
            <div class="age" id="ageResult">0 months</div>
            <div class="age-detail" id="ageDetail">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </div>
    <script>
        function calculateBabyAge() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            const today = new Date();
            
            if (isNaN(birthDate)) { alert('Please select a date'); return; }
            
            let months = (today.getFullYear() - birthDate.getFullYear()) * 12 + (today.getMonth() - birthDate.getMonth());
            if (today.getDate() < birthDate.getDate()) months--;
            
            let years = Math.floor(months / 12);
            let remainingMonths = months % 12;
            
            let text = '';
            if (years > 0) text += years + ' year' + (years > 1 ? 's' : '');
            if (remainingMonths > 0) text += (years > 0 ? ', ' : '') + remainingMonths + ' month' + (remainingMonths > 1 ? 's' : '');
            
            document.getElementById('ageResult').textContent = text || '0 months';
            document.getElementById('ageDetail').textContent = months + ' total months';
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
