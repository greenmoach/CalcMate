    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }
        .calculator {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 400px;
            animation: appear 0.5s ease-out;
        }
        @keyframes appear {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        h1 { color: #2d3436; text-align: center; margin-bottom: 25px; font-size: 1.8rem; }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #636e72; margin-bottom: 8px; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #e84393; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e84393 0%, #fd79a8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(232,67,147,0.3); }
        .result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bmi-value { font-size: 2.5rem; font-weight: 800; color: #2d3436; }
        .bmi-category { font-size: 1.2rem; margin-top: 5px; font-weight: 600; }
        .bmi-underweight { background: #74b9ff; color: white; }
        .bmi-normal { background: #00b894; color: white; }
        .bmi-overweight { background: #fdcb6e; color: #2d3436; }
        .bmi-obese { background: #d63031; color: white; }

<body>
    <div class="calculator">
        <h1>⚖️ BMI Calculator</h1>
        <div class="input-group">
            <label>Height (cm)</label>
            <input type="number" id="height" placeholder="Enter height">
        </div>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="Enter weight">
        </div>
        <button onclick="calculateBMI()">Calculate BMI</button>
        <div class="result" id="result">
            <div class="bmi-value" id="bmiValue">0</div>
            <div class="bmi-category" id="bmiCategory">Normal</div>
        </div>
        <a href="../index.html" class="back-link">← Back to Home</a>
    </div>
    <script>
        function calculateBMI() {
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            
            if (!height || !weight || height <= 0 || weight <= 0) {
                alert('Please enter valid values');
                return;
            }
            
            const heightM = height / 100;
            const bmi = weight / (heightM * heightM);
            const bmiRounded = bmi.toFixed(1);
            
            let category, categoryClass;
            if (bmi < 18.5) { category = 'Underweight'; categoryClass = 'bmi-underweight'; }
            else if (bmi < 25) { category = 'Normal'; categoryClass = 'bmi-normal'; }
            else if (bmi < 30) { category = 'Overweight'; categoryClass = 'bmi-overweight'; }
            else { category = 'Obese'; categoryClass = 'bmi-obese'; }
            
            const result = document.getElementById('result');
            result.className = 'result show ' + categoryClass;
            document.getElementById('bmiValue').textContent = bmiRounded;
            document.getElementById('bmiCategory').textContent = category;
        }
    </script>
