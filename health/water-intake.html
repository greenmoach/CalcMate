    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Varela Round', sans-serif;
            background: linear-gradient(180deg, #89f7fe 0%, #66a6ff 100%);
        }
        .calculator {
            background: white;
            border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(102,166,255,0.4);
            width: 380px;
            text-align: center;
        }
        h1 { color: #0984e3; margin-bottom: 25px; font-size: 1.6rem; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #636e72; margin-bottom: 6px; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 25px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #0984e3; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient #0984e(135deg,3 0%, #74b9ff 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #74b9ff 0%, #81ecec 100%);
            border-radius: 50%;
            display: none;
        }
        .result.show { display: block; }
        .water-amount { font-size: 2.2rem; color: #0984e3; }
        .unit { font-size: 1rem; color: #636e72; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #0984e3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>💧 Water Intake Calculator</h1>
        <div class="input-group">
            <label>Weight (kg)</label>
            <input type="number" id="weight" placeholder="Enter weight">
        </div>
        <div class="input-group">
            <label>Activity Level</label>
            <select id="activity">
                <option value="30">Sedentary</option>
                <option value="35">Light (1-3 days)</option>
                <option value="40">Moderate (3-5 days)</option>
                <option value="45">Active (6-7 days)</option>
                <option value="50">Very Active</option>
            </select>
        </div>
        <button onclick="calculateWater()">Calculate</button>
        <div class="result" id="result">
            <div class="water-amount" id="waterAmount">0</div>
            <div class="unit">ml/day</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculateWater() {
            const weight = parseFloat(document.getElementById('weight').value);
            const activity = parseFloat(document.getElementById('activity').value);
            
            if (!weight) { alert('Please enter weight'); return; }
            
            const water = Math.round(weight * activity);
            document.getElementById('result').classList.add('show');
            document.getElementById('waterAmount').textContent = water;
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
