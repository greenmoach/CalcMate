<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Interest Calculator</title>
    <meta name="description" content="Calculate credit card interest and payoff time. Enter your balance, APR, and monthly payment to see how much interest you'll pay.">
    <meta name="keywords" content="credit card interest calculator, credit card payoff calculator, APR calculator, credit card debt calculator, balance transfer calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/finance/credit-card-interest.html">
    <meta property="og:title" content="Credit Card Interest Calculator">
    <meta property="og:description" content="Calculate credit card interest and payoff time. Enter your balance, APR, and monthly payment to see how much interest you'll pay.">
    <meta property="og:url" content="http://calculator.sotshau.fun/finance/credit-card-interest.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Credit Card Interest Calculator",
        "description": "Calculate credit card interest and payoff time. Enter your balance, APR, and monthly payment to see how much interest you'll pay.",
        "url": "http://calculator.sotshau.fun/finance/credit-card-interest.html",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #c31432 0%, #240b36 100%);
        }
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #c31432; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #c31432; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #c31432 0%, #240b36 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #ffe2e2 0%, #fad0c4 100%);
            border-radius: 15px;
            display: none;
        }
        .result.show { display: block; }
        .interest { font-size: 1.8rem; color: #c31432; font-weight: 800; }
        .total { color: #4a5568; margin-top: 5px; }
        .warning { color: #e74c3c; font-size: 0.85rem; margin-top: 10px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #4a5568; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>💳 Credit Card Interest</h1>
        <div class="input-group">
            <label>Balance ($)</label>
            <input type="number" id="balance" placeholder="Current balance">
        </div>
        <div class="input-group">
            <label>APR (% per year)</label>
            <input type="number" id="apr" step="0.1" placeholder="Interest rate">
        </div>
        <div class="input-group">
            <label>Monthly Payment ($)</label>
            <input type="number" id="payment" placeholder="Payment</div>
        <button onclick="calculateInterest()">Calculate amount">
        </button>
        <div class="result" id="result">
            <div class="interest" id="interestPaid">$0</div>
            <div class="total" id="totalPaid">-</div>
            <div class="warning" id="warning">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculateInterest() {
            let balance = parseFloat(document.getElementById('balance').value);
            const apr = parseFloat(document.getElementById('apr').value);
            const payment = parseFloat(document.getElementById('payment').value);
            
            if (!balance || !apr || !payment) { alert('Please fill all fields'); return; }
            
            if (payment <= balance * (apr/100/12)) {
                alert('Payment too low - balance will grow!');
                return;
            }
            
            let months = 0, totalInterest = 0;
            
            while (balance > 0 && months < 360) {
                const monthlyRate = apr / 100 / 12;
                const interest = balance * monthlyRate;
                balance += interest - payment;
                totalInterest += interest;
                months++;
            }
            
            document.getElementById('interestPaid').textContent = '$' + totalInterest.toFixed(2);
            document.getElementById('totalPaid').textContent = 'Months to pay off: ' + months;
            document.getElementById('warning').textContent = months >= 360 ? '⚠️ Consider paying more!' : '';
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
