    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #11998e; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #11998e; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #d1f7c4 0%, #a8e6cf 100%);
            border-radius: 15px;
            display: none;
        }
        .result.show { display: block; }
        .net { font-size: 2rem; color: #11998e; font-weight: 800; }
        .breakdown { margin-top: 12px; font-size: 0.9rem; color: #4a5568; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #4a5568; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>💵 Salary Tax Calculator</h1>
        <div class="input-group">
            <label>Gross Annual Salary ($)</label>
            <input type="number" id="salary" placeholder="Enter gross salary">
        </div>
        <div class="input-group">
            <label>Tax Filing Status</label>
            <select id="status">
                <option value="single">Single</option>
                <option value="married">Married Filing Jointly</option>
            </select>
        </div>
        <button onclick="calculateTax()">Calculate Net Salary</button>
        <div class="result" id="result">
            <div class="net" id="netSalary">$0</div>
            <div class="breakdown" id="breakdown">Annual</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculateTax() {
            const salary = parseFloat(document.getElementById('salary').value);
            const status = document.getElementById('status').value;
            
            if (!salary) { alert('Please enter salary'); return; }
            
            let tax = 0;
            let taxable = salary;
            
            const brackets = status === 'single' 
                ? [[11000, 0.10], [44725, 0.12], [95375, 0.22], [182100, 0.24], [231250, 0.32], [578125, 0.35], [Infinity, 0.37]]
                : [[22000, 0.10], [89450, 0.12], [190750, 0.22], [364200, 0.24], [462500, 0.32], [693750, 0.35], [Infinity, 0.37]];
            
            let prevLimit = 0;
            for (const [limit, rate] of brackets) {
                if (taxable > prevLimit) {
                    const taxableInBracket = Math.min(taxable, limit) - prevLimit;
                    tax += taxableInBracket * rate;
                    prevLimit = limit;
                } else break;
            }
            
            const netAnnual = salary - tax;
            const netMonthly = netAnnual / 12;
            
            document.getElementById('netSalary').textContent = '$' + netAnnual.toLocaleString();
            document.getElementById('breakdown').innerHTML = 'Monthly: $' + netMonthly.toFixed(2) + '<br>Tax: $' + tax.toFixed(2);
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">

</body>
