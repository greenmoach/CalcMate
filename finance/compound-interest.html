<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon.ico">
    <link rel="icon" type="image/png" href="../favicon-96x96.png" sizes="96x96">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#e94560">
    <title>Compound Interest Calculator</title>
    <meta name="description" content="Calculate compound interest and see how your investments grow over time. Enter principal, interest rate, time period, and compounding frequency.">
    <meta name="keywords" content="compound interest calculator, investment calculator, savings calculator, interest calculator, compound growth calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/finance/compound-interest.html">
    <meta property="og:title" content="Compound Interest Calculator">
    <meta property="og:description" content="Calculate compound interest and see how your investments grow over time. Enter principal, interest rate, time period, and compounding frequency.">
    <meta property="og:url" content="http://calculator.sotshau.fun/finance/compound-interest.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Compound Interest Calculator",
        "description": "Calculate compound interest and see how your investments grow over time. Enter principal, interest rate, time period, and compounding frequency.",
        "url": "http://calculator.sotshau.fun/finance/compound-interest.html",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
        }
        .calculator {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(0,176,155,0.3);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #00b09b; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-weight: 600; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #00b09b; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            border-radius: 15px;
            display: none;
        }
        .result.show { display: block; }
        .future { font-size: 2rem; color: #00b09b; font-weight: 800; }
        .profit { color: #16a34a; margin-top: 5px; }
        .breakdown { margin-top: 15px; font-size: 0.85rem; color: #4a5568; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #4a5568; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>📈 Compound Interest Calculator</h1>
        <div class="input-group">
            <label>Initial Investment ($)</label>
            <input type="number" id="principal" placeholder="Enter initial amount">
        </div>
        <div class="input-group">
            <label>Annual Interest Rate (%)</label>
            <input type="number" id="rate" step="0.1" placeholder="Enter rate">
        </div>
        <div class="input-group">
            <label>Time Period (years)</label>
            <input type="number" id="years" placeholder="Enter years">
        </div>
        <div class="input-group">
            <label>Compound Frequency</label>
            <select id="frequency">
                <option value="1">Annually</option>
                <option value="2">Semi-annually</option>
                <option value="4">Quarterly</option>
                <option value="12" selected>Monthly</option>
                <option value="365">Daily</option>
            </select>
        </div>
        <button onclick="calculateCompound()">Calculate</button>
        <div class="result" id="result">
            <div class="future" id="futureValue">$0</div>
            <div class="profit" id="profit">+$0</div>
            <div class="breakdown" id="breakdown">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculateCompound() {
            const principal = parseFloat(document.getElementById('principal').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const years = parseFloat(document.getElementById('years').value);
            const frequency = parseInt(document.getElementById('frequency').value);
            
            if (!principal || !rate || !years) { alert('Please fill all fields'); return; }
            
            const n = frequency;
            const r = rate / 100;
            const t = years;
            const amount = principal * Math.pow(1 + r/n, n*t);
            const interest = amount - principal;
            
            document.getElementById('futureValue').textContent = '$' + amount.toFixed(2);
            document.getElementById('profit').textContent = '+$' + interest.toFixed(2);
            document.getElementById('breakdown').innerHTML = 'Principal: $' + principal.toFixed(2) + '<br>Interest Earned: $' + interest.toFixed(2);
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
