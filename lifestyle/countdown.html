<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon.ico">
    <link rel="icon" type="image/png" href="../favicon-96x96.png" sizes="96x96">
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#e94560">
    <title>Countdown Calculator</title>
    <meta name="description" content="Count down to any special event or date. Create a countdown to your birthday, vacation, or any important date with our free countdown calculator.">
    <meta name="keywords" content="countdown calculator, countdown to date, event countdown, days until calculator, countdown timer calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/lifestyle/countdown.html">
    <meta property="og:title" content="Countdown Calculator">
    <meta property="og:description" content="Count down to any special event or date. Create a countdown to your birthday, vacation, or any important date with our free countdown calculator.">
    <meta property="og:url" content="http://calculator.sotshau.fun/lifestyle/countdown.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Countdown Calculator",
        "description": "Count down to any special event or date. Create a countdown to your birthday, vacation, or any important date with our free countdown calculator.",
        "url": "http://calculator.sotshau.fun/lifestyle/countdown.html",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fd79a8 0%, #e84393 100%);
        }
        .calculator {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(232,67,147,0.3);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #e84393; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-weight: 700; }
        input {
            width: 100%;
            padding: 14px;
            border: 3px solid #fd79a8;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus { outline: none; border-color: #e84393; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e84393 0%, #fd79a8 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .time { font-size: 2rem; color: #d35400; font-weight: 700; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #e84393; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>⏳ Countdown Timer</h1>
        <div class="input-group">
            <label>Event Name</label>
            <input type="text" id="eventName" placeholder="e.g., Birthday, Vacation">
        </div>
        <div class="input-group">
            <label>Event Date</label>
            <input type="date" id="eventDate">
        </div>
        <button onclick="countdown()">Start Countdown</button>
        <div class="result" id="result">
            <div class="time" id="timeLeft">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function countdown() {
            const event = document.getElementById('eventDate').value;
            if (!event) { alert('Select a date'); return; }
            
            const eventDate = new Date(event);
            const now = new Date();
            
            if (eventDate <= now) {
                document.getElementById('timeLeft').textContent = 'Event has passed!';
            } else {
                const diff = eventDate - now;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('timeLeft').textContent = days + ' days, ' + hours + ' hours';
            }
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
