    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #74b9ff 0%, #0984e3 100%);
        }
        .calculator {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(9,132,227,0.3);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #0984e3; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-weight: 700; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 3px solid #74b9ff;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #0984e3; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0984e3 0%, #74b9ff 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .time { font-size: 2rem; color: #0984e3; font-weight: 700; }
        .details { color: #636e72; margin-top: 8px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #0984e3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>✈️ Travel Time Calculator</h1>
        <div class="input-group">
            <label>Transport Mode</label>
            <select id="mode">
                <option value="car">Car (highway)</option>
                <option value="train">Train</option>
                <option value="flight">Airplane</option>
                <option value="walk">Walking</option>
                <option value="bus">Bus</option>
            </select>
        </div>
        <div class="input-group">
            <label>Distance (km)</label>
            <input type="number" id="distance" placeholder="Enter distance">
        </div>
        <button onclick="calculate()">Calculate Travel Time</button>
        <div class="result" id="result">
            <div class="time" id="travelTime">-</div>
            <div class="details" id="details">-</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const distance = parseFloat(document.getElementById('distance').value);
            const mode = document.getElementById('mode').value;
            
            if (!distance) { alert('Enter distance'); return; }
            
            const speeds = { car: 100, train: 150, flight: 800, walk: 5, bus: 80 };
            const speed = speeds[mode];
            const hours = distance / speed;
            
            let timeStr;
            if (hours < 1) timeStr = Math.round(hours * 60) + ' minutes';
            else {
                const h = Math.floor(hours);
                const m = Math.round((hours - h) * 60);
                timeStr = h + ' hr ' + m + ' min';
            }
            
            document.getElementById('travelTime').textContent = timeStr;
            document.getElementById('details').textContent = 'At ' + speed + ' km/h average';
            document.getElementById('result').classList.add('show');
        }
    </script>
