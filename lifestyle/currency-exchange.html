<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Exchange Calculator</title>
    <meta name="description" content="Convert currencies instantly. Enter amount and select currencies to see exchange rates. Free online currency converter tool.">
    <meta name="keywords" content="currency converter, currency exchange calculator, exchange rate calculator, money converter, forex calculator">
    <link rel="canonical" href="http://calculator.sotshau.fun/lifestyle/currency-exchange.html">
    <meta property="og:title" content="Currency Exchange Calculator">
    <meta property="og:description" content="Convert currencies instantly. Enter amount and select currencies to see exchange rates. Free online currency converter tool.">
    <meta property="og:url" content="http://calculator.sotshau.fun/lifestyle/currency-exchange.html">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Currency Exchange Calculator",
        "description": "Convert currencies instantly. Enter amount and select currencies to see exchange rates. Free online currency converter tool.",
        "url": "http://calculator.sotshau.fun/lifestyle/currency-exchange.html",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "All"
    }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fdcb6e 0%, #e17055 100%);
        }
        .calculator {
            background: white;
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 25px 50px rgba(225,112,85,0.3);
            width: 100%;
            max-width: 420px;
        }
        h1 { color: #e17055; text-align: center; margin-bottom: 25px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #4a5568; margin-bottom: 6px; font-weight: 700; }
        input, select {
            width: 100%;
            padding: 14px;
            border: 3px solid #fab1a0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
        }
        input:focus, select:focus { outline: none; border-color: #e17055; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e17055 0%, #fdcb6e 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        .result {
            margin-top: 25px;
            padding: 25px;
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        .result.show { display: block; }
        .value { font-size: 2.2rem; color: #d35400; font-weight: 700; }
        .note { color: #636e72; font-size: 0.8rem; margin-top: 8px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #636e72; text-decoration: none; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>💱 Currency Exchange</h1>
        <div class="input-group">
            <label>Amount</label>
            <input type="number" id="amount" placeholder="Enter amount">
        </div>
        <div class="input-group">
            <label>From</label>
            <select id="from">
                <option value="1">USD ($)</option>
                <option value="0.85">EUR (€)</option>
                <option value="0.73">GBP (£)</option>
                <option value="7.85">HKD (HK$)</option>
                <option value="150">JPY (¥)</option>
                <option value="7.24">CNY (¥)</option>
                <option value="33">TWD (NT$)</option>
            </select>
        </div>
        <div class="input-group">
            <label>To</label>
            <select id="to">
                <option value="1">USD ($)</option>
                <option value="0.85">EUR (€)</option>
                <option value="0.73">GBP (£)</option>
                <option value="7.85">HKD (HK$)</option>
                <option value="150">JPY (¥)</option>
                <option value="7.24">CNY (¥)</option>
                <option value="33" selected>TWD (NT$)</option>
            </select>
        </div>
        <button onclick="convert()">Convert</button>
        <div class="result" id="result">
            <div class="value" id="resultValue">0</div>
            <div class="note">* Approximate rates</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function convert() {
            const amount = parseFloat(document.getElementById('amount').value);
            const fromRate = parseFloat(document.getElementById('from').value);
            const toRate = parseFloat(document.getElementById('to').value);
            
            if (!amount) { alert('Enter amount'); return; }
            
            const usdAmount = amount / fromRate;
            const result = usdAmount * toRate;
            
            document.getElementById('resultValue').textContent = result.toFixed(2);
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
        <p>AI-assisted project &bull; Built with <a href="https://opencode.ai" target="_blank" style="color:#888;text-decoration:underline;">opencode</a></p>
    </footer>
</body>
</html>
