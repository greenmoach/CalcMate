    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Fredoka One', cursive; background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .calculator { background: #fff; border-radius: 30px; padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); width: 100%; max-width: 380px; text-align: center; }
        h1 { color: #e84393; margin-bottom: 25px; font-size: 1.6rem; }
        .input-group { margin-bottom: 18px; }
        label { display: block; color: #333; margin-bottom: 8px; font-family: sans-serif; }
        input { width: 100%; padding: 15px; border: 3px solid #fce4ec; border-radius: 15px; font-size: 1rem; font-family: sans-serif; }
        input:focus { outline: none; border-color: #e84393; }
        button { width: 100%; padding: 18px; background: linear-gradient(135deg, #e84393 0%, #a8edea 100%); color: #fff; border: none; border-radius: 15px; font-size: 1.2rem; font-family: inherit; cursor: pointer; }
        button:hover { transform: scale(1.02); }
        .result { margin-top: 30px; padding: 30px; border-radius: 20px; display: none; }
        .result.show { display: block; animation: spin 0.5s; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        .color { font-size: 4rem; }
        .name { font-size: 1.5rem; color: #333; margin-top: 10px; font-family: sans-serif; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #e84393; text-decoration: none; font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🌈 Lucky Color</h1>
        <div class="input-group">
            <label>Your Birthdate</label>
            <input type="date" id="birthdate">
        </div>
        <button onclick="calculate()">Find Color!</button>
        <div class="result" id="result">
            <div class="color" id="color">🔴</div>
            <div class="name" id="name">Red</div>
        </div>
        <a href="../../index.html" class="back-link">← Back to Home</a>
    </script>
    <script>
        function calculate() {
            const date = document.getElementById('birthdate').value;
            if (!date) { alert('Select a date'); return; }
            const day = new Date(date).getDate();
            const colors = [
                {emoji: '🔴', name: 'Red', bg: '#ff7675'},
                {emoji: '🟠', name: 'Orange', bg: '#fdcb6e'},
                {emoji: '🟡', name: 'Yellow', bg: '#ffeaa7'},
                {emoji: '🟢', name: 'Green', bg: '#55efc4'},
                {emoji: '🔵', name: 'Blue', bg: '#74b9ff'},
                {emoji: '🟣', name: 'Purple', bg: '#a29bfe'},
                {emoji: '💗', name: 'Pink', bg: '#fd79a8'}
            ];
            const color = colors[day % colors.length];
            document.getElementById('color').textContent = color.emoji;
            document.getElementById('name').textContent = color.name;
            document.getElementById('result').style.background = color.bg;
            document.getElementById('result').classList.add('show');
        }
    </script>
    <footer style="text-align:center;padding:20px;font-size:12px;color:#888;border-top:1px solid #eee;margin-top:40px;">
